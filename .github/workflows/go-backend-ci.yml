name: Go Backend CI/CD

on:
  push:
    branches: [main]
    paths: [go_backend/**]
  pull_request:
    branches: [main]
    paths: [go_backend/**]

env:
  GO_VERSION: '1.21'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go mod tidy
        run: cd go_backend && go mod tidy

      - name: Download dependencies
        run: cd go_backend && go mod download

      - name: Run tests
        run: cd go_backend && go test ./...

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        run: cd go_backend && go build -o linguaflow-server ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linguaflow-server
          path: go_backend/linguaflow-server
          retention-days: 14
